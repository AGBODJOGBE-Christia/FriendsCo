<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administration</title>
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <nav>
            <h2>Panel Admin</h2>
            <a href="../../vues/clients/accueil.html" style="color:#94a3b8; text-decoration: none; font-size: 14px; padding: 5px 10px; border-radius: 8px; transition: 0.2s;">⬅️ Retour à l'accueil</a>
            <div>
                <span id="roleDisplay">Rôle : </span>
                <button id="adminLogoutBtn">Déconnexion</button>
            </div>
        </nav>

        <div class="dashboard">
            <!-- Section Statistiques (Graphiques simples CSS) -->
            <h3>Statistiques Globales</h3>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-box"><h4>Utilisateurs</h4><span id="statUsers">0</span></div>
                <div class="stat-box"><h4>Publications</h4><span id="statPosts">0</span></div>
                <div class="stat-box"><h4>Commentaires</h4><span id="statComments">0</span></div>
                <div class="stat-box"><h4>Messages</h4><span id="statMessages">0</span></div>
            </div>

                            <!-- Section Modération : Gestion des Utilisateurs -->
                <div class="admin-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">Gestion des Utilisateurs</h3>
                        
                        <!-- Bouton "+" pour ouvrir la pop-up (visible uniquement pour l'admin) -->
                        <button id="openAddStaffBtn" style="display: none; background: #0f172a; color: white; border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.2s;">
                            +
                        </button>
                    </div>

                    <!-- Le tableau des utilisateurs -->
                    <table id="usersTable">
                        <thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Actions</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                
                <!-- LA POP-UP (MODALE) D'AJOUT DE STAFF (Cachée par défaut) -->
               
                <div id="addStaffModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
                    
                    <div style="background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative;">
                        
                        <!-- Bouton Fermer (X) en haut à droite -->
                        <button id="closeModalBtn" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b;">&times;</button>
                        
                        <h3 style="margin-top: 0; color: #0f172a;">Ajouter un membre du staff</h3>
                        
                        <!-- Formulaire dans la pop-up -->
                        <form id="addStaffForm">
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;">Nom</label>
                                <input type="text" id="new_nom" placeholder="Nom" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;">Prénom</label>
                                <input type="text" id="new_prenom" placeholder="Prénom" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;">Email</label>
                                <input type="email" id="new_email" placeholder="Email" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px;">
                            </div>
                            <div class="form-group" style="margin-bottom: 20px;">
                                <label style="display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;">Rôle</label>
                                <select id="new_role" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; background: white;">
                                    <option value="moderator">Modérateur</option>
                                    <option value="admin">Administrateur</option>
                                </select>
                            </div>
                            
                            <button type="submit" style="width: 100%; background: #0f172a; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px;">
                                Ajouter
                            </button>
                        </form>
                        
                        <div id="staffMessage" class="message-box" style="margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; display: none;"></div>
                    </div>
                </div>

            <!-- Section Modération : Gestion des Posts -->
            <div class="admin-section">
                <h3>Gestion des Publications (Modération)</h3>
                <table id="postsTable">
                    <thead><tr><th>Auteur</th><th>Contenu</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../../assets/js/admin-dashboard.js"></script>
    <script src="../../assets/js/admin-logout.js"></script>
</body>
</html>
