<!DOCTYPE html>
<html>
<head><title>Nouveau mot de passe</title></head>
<body>
    <h2>Définir un nouveau mot de passe</h2>
    <form id="resetForm">
        <input type="hidden" id="token" value="">
        <input type="password" id="new_password" placeholder="Nouveau mot de passe" required>
        <button type="submit">Valider</button>
    </form>
    <div id="message"></div>
    <script>
        // Récupérer le token dans l'URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('token').value = urlParams.get('token');
    </script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
