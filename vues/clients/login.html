<!DOCTYPE html>

    <title>Connexion - Réseau Social</title>

</head>
<body>
    <div class="auth-container">
        <h2>Connexion</h2>

        <div id="message"></div>
    </div>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
